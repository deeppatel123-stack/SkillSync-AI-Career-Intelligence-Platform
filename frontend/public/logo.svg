<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="100%" height="100%">
  <defs>
    <!-- Linear gradients to match the theme -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4299e1" stop-opacity="1" />
      <stop offset="100%" stop-color="#2c5282" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3182ce" stop-opacity="1" />
      <stop offset="100%" stop-color="#63b3ed" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- ICON GROUP (shifted to x=8, y=8) -->
  <g transform="translate(8, 8) scale(0.75)">
    <!-- Network lines (semi-transparent) -->
    <line x1="32" y1="12" x2="10" y2="25" stroke="#4299e1" stroke-width="2" opacity="0.4" />
    <line x1="32" y1="12" x2="54" y2="25" stroke="#4299e1" stroke-width="2" opacity="0.4" />
    <line x1="10" y1="25" x2="32" y2="48" stroke="#4299e1" stroke-width="2" opacity="0.4" />
    <line x1="54" y1="25" x2="32" y2="48" stroke="#4299e1" stroke-width="2" opacity="0.4" />
    
    <!-- Graduation Cap Diamond Outline/Shape -->
    <polygon points="32,12 54,25 32,38 10,25" fill="none" stroke="url(#primaryGrad)" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Cap Skull Base -->
    <path d="M20,31 Q32,38 44,31 L44,35 Q32,42 20,35 Z" fill="#2c5282" />
    
    <!-- Golden Tassel -->
    <path d="M32,25 L45,30 L45,40" stroke="#f6ad55" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="45" cy="40" r="2.5" fill="#f6ad55" />
    
    <!-- Upward Arrow (Career Growth) -->
    <path d="M32,48 L32,18 M26,24 L32,18 L38,24" stroke="url(#arrowGrad)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Connection Nodes (Circles at intersections) -->
    <circle cx="32" cy="12" r="4.5" fill="#4299e1" stroke="#ffffff" stroke-width="1.5" />
    <circle cx="10" cy="25" r="4.5" fill="#4299e1" stroke="#ffffff" stroke-width="1.5" />
    <circle cx="54" cy="25" r="4.5" fill="#4299e1" stroke="#ffffff" stroke-width="1.5" />
    <circle cx="32" cy="48" r="4.5" fill="#2c5282" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- TEXT (scalable sans-serif font) -->
  <text x="64" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="-0.5">
    <tspan fill="#2c5282">Uni</tspan><tspan fill="#4299e1" font-weight="800">Connect</tspan>
  </text>
</svg>
